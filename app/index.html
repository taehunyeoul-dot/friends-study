<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Friends 영어공부</title>
<meta name="description" content="프렌즈 대본으로 배우는 영어 표현 — 에피소드 리더 + 간격반복 플래시카드">
<meta name="theme-color" content="#D2E9F7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0E1E2E" media="(prefers-color-scheme: dark)">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Friends">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" href="icons/icon-180.png">
<link rel="stylesheet" href="app.css">
</head>
<body>
<header id="topbar">
  <button id="backBtn" class="iconbtn" hidden aria-label="뒤로">‹</button>
  <h1 id="title">F·R·I·E·N·D·S</h1>
  <button id="settingsBtn" class="iconbtn" aria-label="설정">⋯</button>
</header>

<main id="view" tabindex="-1"></main>

<nav id="tabbar">
  <button data-route="#/home" class="tab active">
    <span class="tab-ico">▤</span><span>에피</span>
  </button>
  <button data-route="#/review" class="tab">
    <span class="tab-ico">◉</span><span>표현</span>
    <em id="reviewBadge" class="badge" hidden></em>
  </button>
  <button data-route="#/quiz" class="tab">
    <span class="tab-ico">▸</span><span>퀴즈</span>
  </button>
</nav>

<!-- 카카오톡 인앱 브라우저 안내 -->
<div id="kakaoGuide" hidden>
  <div class="kg-box">
    <div class="kg-ico">📱</div>
    <h2>카카오톡 브라우저에서는<br>앱 설치가 안 돼요</h2>
    <div id="kakaoStepsIos" hidden>
      <div class="kg-step">① 오른쪽 아래 <b>⋯</b> 버튼을 누르세요</div>
      <div class="kg-step">② <b>“다른 브라우저로 열기”</b>를 누르세요</div>
    </div>
    <div id="kakaoStepsAnd" hidden>
      <div class="kg-step">잠시 후 <b>크롬</b>으로 자동 이동해요</div>
      <div class="kg-step">안 열리면: 오른쪽 아래 <b>⋯</b> 버튼 →<br><b>“다른 브라우저로 열기”</b></div>
    </div>
  </div>
</div>

<!-- 홈 화면 설치 안내 배너 -->
<div id="installBanner" hidden>
  <div class="ib-txt">
    <b>홈 화면에 앱으로 추가</b>
    <span id="ibIos" hidden>Safari 아래 <b>공유 버튼(⬆︎)</b> → <b>“홈 화면에 추가”</b></span>
    <span id="ibAnd" hidden>설치하면 홈 화면에서 바로 열 수 있어요</span>
  </div>
  <button id="ibInstall" hidden>설치</button>
  <button id="ibClose" aria-label="닫기">✕</button>
</div>

<script src="app.js"></script>
</body>
</html>
